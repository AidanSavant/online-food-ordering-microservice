services:
  catalog_service:
    build: ./services/catalog_service
    
    ports: 
      - "8001:8001"
    
    environment:
      - DATABASE_URL=postgres://catalog_user:yeahidk123!@postgres:5432/catalog_db
    
    depends_on:
      postgres:
        condition: service_healthy

  order_cart_service:
    build: ./services/order_cart_service

    ports:
      - "8002:8002"
    
    environment:
      - REDIS_URL=redis://redis:6379
    
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:latest
  
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: yeahidk123!
      POSTGRES_DB: catalog_db
    
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
