services:
  catalog_service:
    build: ./services/catalog_service
    ports: 
      - "8001:8001"
    
    environment:
      - DATABASE_URL=postgres://catalog_user:yeahidk123!@postgres:5432/catalog_db
    
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: yeahidk123!
      POSTGRES_DB: catalog_db
    
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user"]
      interval: 5s
      timeout: 5s
      retries: 3
